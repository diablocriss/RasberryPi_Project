moonshine:
  language: "en"

vad:
  record_seconds: 6           # max recording length
  silence_timeout: 0.6        # stop after N seconds of silence
  silence_rms_threshold: 300  # RMS below this = silence
  activity_rms_threshold: 800 # RMS above this = voice detected

tts:
  voice: "en-US-AvaMultilingualNeural"
  rate: "-10%"
  volume: 2.0                 # ffmpeg volume filter; >1 amplifies, <1 attenuates

audio:
  device: "plughw:2,0"
  hw_rate: 48000
  hw_channels: 2
  target_rate: 16000
  chunk_ms: 40
