[loggers]
keys=root,robot_voice

[handlers]
keys=console,file

[formatters]
keys=standard

[logger_root]
level=INFO
handlers=console

[logger_robot_voice]
level=INFO
handlers=console,file
qualname=robot_voice
propagate=0

[handler_console]
class=StreamHandler
level=INFO
formatter=standard
args=(sys.stdout,)

[handler_file]
class=FileHandler
level=INFO
formatter=standard
args=('logs/pipeline.log', 'a')

[formatter_standard]
format=%(asctime)s %(levelname)s %(name)s: %(message)s
